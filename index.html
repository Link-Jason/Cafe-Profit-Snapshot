<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe Profit Snapshot</title>

<style>
:root {
  --bg: #fafafa;
  --card-bg: #ffffff;
  --text: #1a1a1a;
  --text-muted: #666;
  --border: #f0f0f0;
  --green: #2e7d32;
  --green-bg: #e8f5e9;
  --yellow: #f57c00;
  --yellow-bg: #fff9e6;
  --red: #c62828;
  --red-bg: #ffebee;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  padding: 1.5rem 1rem;
  max-width: 520px;
  margin: 0 auto;
}

header {
  text-align: left;
  margin-bottom: 1.5rem;
}

h1 {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.25rem;
}

.subtitle {
  font-size: 0.85rem;
  color: var(--text-muted);
  max-width: 28rem;
}

.card {
  background: var(--card-bg);
  padding: 1.2rem;
  border-radius: 12px;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}

.product-name {
  font-weight: 700;
  font-size: 1.05rem;
}

.unit-price {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.input-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 0.75rem;
}

.input-box label {
  display: block;
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #f9f9f9;
  text-align: center;
  font-weight: 600;
}

input:focus {
  outline: none;
  border-color: #1a1a1a;
  background: #ffffff;
}

.profit-line {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-radius: 6px;
  font-weight: 600;
  font-size: 0.9rem;
}

.status-strong { background: var(--green-bg); color: var(--green); }
.status-stable { background: var(--yellow-bg); color: var(--yellow); }
.status-attention { background: var(--red-bg); color: var(--red); }

.waste-line {
  display: flex;
  justify-content: space-between;
  padding: 8px 10px;
  margin-top: 6px;
  border-radius: 6px;
  background: var(--red-bg);
  color: var(--red);
  font-size: 0.8rem;
  font-weight: 600;
}

.summary-box {
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 1.3rem 1.2rem;
  margin-top: 2rem;
}

.summary-box h2 {
  font-weight: 600;
  font-size: 0.95rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 0.5rem;
}

.summary-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.summary-value {
  font-weight: 700;
}

.summary-profit {
  color: var(--green);
  font-size: 1.4rem;
}

.summary-loss {
  color: var(--red);
  font-size: 1.2rem;
}

.insight-box {
  margin-top: 1rem;
  padding: 0.9rem 1rem;
  border-radius: 10px;
  background: #f4f6ff;
  border: 1px solid #e0e4ff;
  font-size: 0.85rem;
  color: var(--text);
}

.insight-box strong {
  font-weight: 600;
}
</style>
</head>

<body>

<header>
  <h1>Café Profit &amp; Loss — Waste Awareness Tracker</h1>
  <p class="subtitle">Track weekly earnings and identify profit lost to unsold inventory.</p>
</header>

<div id="product-list"></div>

<div class="summary-box">
  <h2>Weekly Overview</h2>

  <div class="summary-row">
    <span class="summary-label">Weekly Net Profit</span>
    <span id="grand-total" class="summary-value summary-profit">€0.00</span>
  </div>

  <div class="summary-row">
    <span class="summary-label">Total Profit Lost to Waste</span>
    <span id="total-waste" class="summary-value summary-loss">€0.00</span>
  </div>
</div>

<div class="insight-box">
  <p>
    <strong>Efficiency Goal:</strong>
    Reducing waste by 20% would increase weekly profit by
    <span id="goal-impact">€0.00</span>.
  </p>
</div>

<script>
const products = [
  { name: 'Korvapuusti', price: 4.50, cost: 1.40, sold: 120, waste: 0 },
  { name: 'Cookie', price: 4.80, cost: 2.20, sold: 95, waste: 0 },
  { name: 'Carrot Cake', price: 5.20, cost: 2.80, sold: 40, waste: 0 },
  { name: 'Scone', price: 3.90, cost: 0.78, sold: 60, waste: 0 }
];

function renderApp() {
  const container = document.getElementById('product-list');
  container.innerHTML = '';

  let totalNetProfit = 0;
  let totalWasteImpact = 0;

  products.forEach((product, index) => {
    const profitPerUnit = product.price - product.cost;
    const netProfit = profitPerUnit * product.sold;
    const wasteImpact = profitPerUnit * product.waste;
    const margin = (profitPerUnit / product.price) * 100;

    totalNetProfit += netProfit;
    totalWasteImpact += wasteImpact;

    let statusClass = 'status-stable';
    if (margin >= 65) statusClass = 'status-strong';
    if (margin < 40) statusClass = 'status-attention';

    const card = document.createElement('div');
    card.className = 'card';

    const wasteLine = product.waste > 0
      ? `
      <div class="waste-line">
        <span>Waste Impact</span>
        <span>€${wasteImpact.toFixed(2)} lost</span>
      </div>
      `
      : '';

    card.innerHTML = `
      <div class="card-header">
        <span class="product-name">${product.name}</span>
        <span class="unit-price">
          €${product.price.toFixed(2)} / unit
        </span>
      </div>

      <div class="input-row">
        <div class="input-box">
          <label>Units Sold</label>
          <input type="number" min="0"
            value="${product.sold}"
            oninput="updateValue(${index}, 'sold', this.value)">
        </div>

        <div class="input-box">
          <label>Waste Units</label>
          <input type="number" min="0"
            value="${product.waste}"
            oninput="updateValue(${index}, 'waste', this.value)">
        </div>
      </div>

      <div class="profit-line ${statusClass}">
        <span>Net Profit Contribution</span>
        <span>€${netProfit.toFixed(2)}</span>
      </div>
      ${wasteLine}
    `;

    container.appendChild(card);
  });

  const totalWasteElement = document.getElementById('total-waste');
  const goalImpactElement = document.getElementById('goal-impact');

  document.getElementById('grand-total').innerText =
    `€${totalNetProfit.toFixed(2)}`;

  totalWasteElement.innerText =
    `€${totalWasteImpact.toFixed(2)}`;

  goalImpactElement.innerText =
    `€${(totalWasteImpact * 0.2).toFixed(2)}`;
}

function updateValue(index, field, value) {
  products[index][field] = parseFloat(value) || 0;
  renderApp();
}

renderApp();
</script>

</body>
</html>
